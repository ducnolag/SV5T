worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting zones
    # Zone for login APIs: 5 requests per second
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/s;
    # Zone for general APIs: 20 requests per second
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    server {
        listen       3000;
        server_name  localhost;

        # Serve Frontend
        location / {
            root   d:/hackathon/frontend-app/dist;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Serve Uploads
        location /uploads/ {
            alias d:/hackathon/services/proof-service/uploads/;
        }

        # Auth Service (3001)
        location /api/auth {
            limit_req zone=login_limit burst=10 nodelay;
            proxy_pass http://127.0.0.1:3001/auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Unit Service (3002)
        location /api/units {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://127.0.0.1:3002/units;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Activity Service (3003)
        location /api/activities {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://127.0.0.1:3003/activities;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Attendance Service (3004)
        location /api/attendance {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://127.0.0.1:3004/attendance;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Proof Service (3005)
        location /api/proofs {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://127.0.0.1:3005/proofs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Application Service (3006)
        location /api/applications {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://127.0.0.1:3006/applications;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Notification Service (3007) - WebSockets
        location /socket.io/ {
            proxy_pass http://127.0.0.1:3007/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # AI Service (3008)
        location /api/ai {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://127.0.0.1:3008/api/ai;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
